<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System - Professional Gradebook</title>
    <link rel="stylesheet" href="StyleSheet/AttendanceManagement.css">
    <link rel="stylesheet" href="StyleSheet/SideBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .main-content { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 30px; background-color: #f4f7f6; }
        #sidebar-placeholder { width: 250px; min-width: 250px; }

        /* Course Grid Styling */
        #courseGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .course-card { 
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 5px solid #3498db; cursor: pointer; transition: 0.3s; position: relative;
        }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .course-card i { position: absolute; right: 20px; bottom: 20px; color: #f0f0f0; font-size: 3rem; z-index: 0; }
        
        /* Modal & Tab Styling */
        .logout-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; align-items: flex-start; justify-content: center; z-index: 9999; padding-top: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        
        .tab-nav { display: flex; gap: 10px; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-weight: 600; color: #95a5a6; transition: 0.3s; }
        .tab-btn.active { color: #3498db; border-bottom: 3px solid #3498db; }
        
        .term-selector { display: flex; gap: 10px; margin-bottom: 15px; background: #ebf2f7; padding: 10px; border-radius: 8px; }
        .term-radio { display: none; }
        .term-label { padding: 8px 15px; background: white; border-radius: 5px; cursor: pointer; border: 1px solid #d1d8dd; font-size: 0.9rem; font-weight: bold; }
        .term-radio:checked + .term-label { background: #3498db; color: white; border-color: #3498db; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; color: #2c3e50; border-bottom: 2px solid #dee2e6; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .score-input { width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; text-align: center; }
        .grade-pill { padding: 4px 8px; border-radius: 20px; font-weight: bold; background: #eee; font-size: 0.8rem; }
        .grade-pass { background: #e8f5e9; color: #2e7d32; }
        .grade-fail { background: #ffebee; color: #c62828; }
    </style>
</head>
<body style="display: flex; margin: 0;">

    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <header class="top-header">
            <div class="header-left">
                <h1>Academic Management Portal</h1>
                <p style="color: #7f8c8d;">Comprehensive view of attendance and student performance</p>
            </div>
        </header>
        <div id="courseGrid"></div>
    </div>

    <div id="courseModal" class="logout-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 id="modalCourseTitle" style="margin: 0; color: #2c3e50;">Subject Name</h2>
                <button onclick="closeCourseModal()" style="background:none; border:none; font-size: 2rem; cursor:pointer; color: #95a5a6;">&times;</button>
            </div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('attendanceTab', this)">Attendance</button>
                <button class="tab-btn" onclick="switchTab('scoringTab', this)">Activities</button>
                <button class="tab-btn" onclick="switchTab('summaryTab', this); window.fetchGradeSummary();">Grade Summary</button>
            </div>

            <div id="attendanceTab" class="tab-content">
                <div class="term-selector">
                    <input type="radio" name="attTerm" id="attPrelim" value="Prelim" checked onchange="window.fetchStudents()">
                    <label for="attPrelim" class="term-label">Prelim</label>
                    <input type="radio" name="attTerm" id="attMidterm" value="Midterm" onchange="window.fetchStudents()">
                    <label for="attMidterm" class="term-label">Midterm</label>
                    <input type="radio" name="attTerm" id="attFinal" value="Final" onchange="window.fetchStudents()">
                    <label for="attFinal" class="term-label">Final</label>
                </div>
                <input type="date" id="modalDateInput" onchange="window.fetchStudents()" style="padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ddd;">
                <table>
                    <thead><tr><th>Student Name</th><th>Student ID</th><th>Status</th></tr></thead>
                    <tbody id="modalAttendanceBody"></tbody>
                </table>
                <button onclick="saveAttendance()" style="margin-top: 20px; background: #2ecc71; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%;">Save Attendance</button>
            </div>

            <div id="scoringTab" class="tab-content" style="display: none;">
                <div class="term-selector">
                    <input type="radio" name="scoreTerm" id="scorePrelim" value="Prelim" checked>
                    <label for="scorePrelim" class="term-label">Prelim</label>
                    <input type="radio" name="scoreTerm" id="scoreMidterm" value="Midterm">
                    <label for="scoreMidterm" class="term-label">Midterm</label>
                    <input type="radio" name="scoreTerm" id="scoreFinal" value="Final">
                    <label for="scoreFinal" class="term-label">Final</label>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="activityName" placeholder="Activity Title" style="flex: 2; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    <input type="number" id="maxScore" placeholder="Max" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                </div>
                <tbody id="modalScoringBody"></tbody>
                <table>
                    <thead><tr><th>Student Name</th><th>ID</th><th>Score</th></tr></thead>
                    <tbody id="modalScoringBodyInner"></tbody>
                </table>
                <button onclick="saveScores()" style="margin-top: 20px; background: #3498db; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%;">Post Scores</button>
            </div>

            <div id="summaryTab" class="tab-content" style="display: none;">
                <div style="background: #fff8e1; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #ffc107;">
                    <strong>Weighting:</strong> Prelim (30%) + Midterm (30%) + Final (40%) = 100%
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Prelim</th>
                            <th>Midterm</th>
                            <th>Final</th>
                            <th style="background: #eee;">TOTAL (100%)</th>
                            <th>Remark</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, get, set, query, orderByChild, equalTo } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCSADfQpAWpCbB8Idf3Eu94kMeO-7QX4aQ",
            authDomain: "attendancesystem-cb683.firebaseapp.com",
            databaseURL: "https://attendancesystem-cb683-default-rtdb.firebaseio.com",
            projectId: "attendancesystem-cb683",
            storageBucket: "attendancesystem-cb683.firebasestorage.app",
            messagingSenderId: "975901701661",
            appId: "1:975901701661:web:f8ccfbafd8e6c6e9c3f8f4",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentSelectedCourse = "";

        onAuthStateChanged(auth, (user) => {
            if (user) { loadSidebar(); fetchCourseGrid(); }
            else { window.location.href = 'index.html'; }
        });

        async function loadSidebar() {
            try {
                const response = await fetch('SideBar.html');
                if (response.ok) document.getElementById('sidebar-placeholder').innerHTML = await response.text();
            } catch (err) { console.error(err); }
        }

        async function fetchCourseGrid() {
            const grid = document.getElementById("courseGrid");
            const snapshot = await get(ref(db, 'students'));
            if (snapshot.exists()) {
                const courses = new Set();
                snapshot.forEach(child => { if (child.val().stuCourses) courses.add(child.val().stuCourses); });
                grid.innerHTML = Array.from(courses).sort().map(course => `
                    <div class="course-card" onclick="openCourseModal('${course}')">
                        <h3>${course}</h3>
                        <p style="color: #3498db; font-weight: bold;">Manage Portal <i class="fas fa-arrow-right"></i></p>
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                `).join('');
            }
        }

        window.openCourseModal = (course) => {
            currentSelectedCourse = course;
            document.getElementById("modalCourseTitle").innerText = course;
            document.getElementById("courseModal").style.display = "flex";
            document.getElementById("modalDateInput").valueAsDate = new Date();
            window.fetchStudents();
            window.loadScoringList();
        };

        window.closeCourseModal = () => document.getElementById("courseModal").style.display = "none";

        window.switchTab = (tabId, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            btn.classList.add('active');
        };

        // --- ATTENDANCE ---
        window.fetchStudents = async () => {
            const body = document.getElementById("modalAttendanceBody");
            const dateVal = document.getElementById("modalDateInput").value;
            const term = document.querySelector('input[name="attTerm"]:checked').value;
            if (!dateVal || !currentSelectedCourse) return;
            
            const attendanceSnap = await get(ref(db, `attendance/${currentSelectedCourse}/${term}/${dateVal}`));
            const savedData = attendanceSnap.exists() ? attendanceSnap.val() : {};
            const studentSnap = await get(query(ref(db, 'students'), orderByChild('stuCourses'), equalTo(currentSelectedCourse)));
            
            body.innerHTML = "";
            studentSnap.forEach(child => {
                const data = child.val();
                const status = savedData[child.key] ? savedData[child.key].status : "PRESENT";
                body.innerHTML += `<tr><td>${data.name}</td><td>${data.studentID}</td>
                    <td><select class="status-select" data-uid="${child.key}" data-name="${data.name}" data-sid="${data.studentID}">
                        <option value="PRESENT" ${status==='PRESENT'?'selected':''}>PRESENT</option>
                        <option value="LATE" ${status==='LATE'?'selected':''}>LATE</option>
                        <option value="ABSENT" ${status==='ABSENT'?'selected':''}>ABSENT</option>
                    </select></td></tr>`;
            });
        };

        window.saveAttendance = async () => {
            const dateVal = document.getElementById("modalDateInput").value;
            const term = document.querySelector('input[name="attTerm"]:checked').value;
            const updates = Array.from(document.querySelectorAll(".status-select")).map(sel => 
                set(ref(db, `attendance/${currentSelectedCourse}/${term}/${dateVal}/${sel.dataset.uid}`), {
                    name: sel.dataset.name, studentID: sel.dataset.sid, status: sel.value, timestamp: new Date().toISOString()
                })
            );
            await Promise.all(updates); alert("Attendance Saved!");
        };

        // --- SCORING ---
        window.loadScoringList = async () => {
            const body = document.getElementById("modalScoringBodyInner");
            const snapshot = await get(query(ref(db, 'students'), orderByChild('stuCourses'), equalTo(currentSelectedCourse)));
            body.innerHTML = "";
            snapshot.forEach(child => {
                const data = child.val();
                body.innerHTML += `<tr><td>${data.name}</td><td>${data.studentID}</td>
                    <td><input type="number" class="score-input" data-uid="${child.key}" data-name="${data.name}"></td></tr>`;
            });
        };

        window.saveScores = async () => {
            const term = document.querySelector('input[name="scoreTerm"]:checked').value;
            const actName = document.getElementById("activityName").value.trim();
            const max = document.getElementById("maxScore").value;
            if(!actName || !max) return alert("Missing Info");
            const updates = Array.from(document.querySelectorAll(".score-input")).map(input => 
                set(ref(db, `scores/${currentSelectedCourse}/${term}/${actName}/${input.dataset.uid}`), {
                    studentName: input.dataset.name, score: Number(input.value) || 0, maxScore: Number(max), recordedAt: new Date().toISOString()
                })
            );
            await Promise.all(updates); alert("Scores Posted!");
        };

        // --- SUMMARY LOGIC (THE VIEWER) ---
        window.fetchGradeSummary = async () => {
            const body = document.getElementById("summaryBody");
            body.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Calculating weights and averages...</td></tr>";

            try {
                const studentsSnap = await get(query(ref(db, 'students'), orderByChild('stuCourses'), equalTo(currentSelectedCourse)));
                const scoresSnap = await get(ref(db, `scores/${currentSelectedCourse}`));
                const scoreData = scoresSnap.exists() ? scoresSnap.val() : {};

                body.innerHTML = "";
                studentsSnap.forEach(student => {
                    const uid = student.key;
                    const name = student.val().name;

                    // Calculate Avg for each term
                    const getTermAvg = (termName) => {
                        let totalObtained = 0, totalMax = 0;
                        if (scoreData[termName]) {
                            Object.values(scoreData[termName]).forEach(activity => {
                                if (activity[uid]) {
                                    totalObtained += Number(activity[uid].score);
                                    totalMax += Number(activity[uid].maxScore);
                                }
                            });
                        }
                        return totalMax > 0 ? (totalObtained / totalMax) * 100 : 0;
                    };

                    const pAvg = getTermAvg('Prelim');
                    const mAvg = getTermAvg('Midterm');
                    const fAvg = getTermAvg('Final');
                    
                    // Calculation: P(30%) + M(30%) + F(40%)
                    const finalGrade = (pAvg * 0.3) + (mAvg * 0.3) + (fAvg * 0.4);
                    const remark = finalGrade >= 75 ? '<span class="grade-pill grade-pass">PASSED</span>' : '<span class="grade-pill grade-fail">FAILED</span>';

                    body.innerHTML += `
                        <tr>
                            <td><strong>${name}</strong></td>
                            <td>${pAvg.toFixed(1)}%</td>
                            <td>${mAvg.toFixed(1)}%</td>
                            <td>${fAvg.toFixed(1)}%</td>
                            <td style="background: #f9f9f9; font-weight: bold;">${finalGrade.toFixed(2)}%</td>
                            <td>${remark}</td>
                        </tr>`;
                });
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
